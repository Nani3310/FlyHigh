<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .checkout-loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="checkout-loader">
        <div class="spinner"></div>
        <h3 style="color: #1f2937;">Connecting directly to Razorpay...</h3>
        <p style="color: #6b7280; font-size: 14px;">Please do not refresh the page.</p>
    </div>

    <!-- The native Razorpay checkout integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "<%= keyId %>", 
            "amount": "<%= amount %>", // Amount is in currency subunits
            "currency": "INR",
            "name": "FlyHigh Incorporations",
            "description": "Booking Transaction",
            "order_id": "<%= orderId %>",
            "handler": function (response){
                // Post the details back securely to the server to verify the signature
                const form = document.createElement("form");
                form.method = "POST";
                form.action = "/verify-payment";

                const data = {
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_signature: response.razorpay_signature,
                    bookingId: "<%= bookingId %>",
                    bookingType: "<%= bookingType %>"
                };

                for(const key in data) {
                    const hiddenField = document.createElement("input");
                    hiddenField.type = "hidden";
                    hiddenField.name = key;
                    hiddenField.value = data[key];
                    form.appendChild(hiddenField);
                }
                
                document.body.appendChild(form);
                form.submit();
            },
            "prefill": {
                "name": "<%= user.name %>",
                "email": "<%= user.email %>",
                "contact": "9999999999"
            },
            "theme": {
                "color": "#2563eb" // Matching standard aesthetics
            },
            "modal": {
                "ondismiss": function(){
                    window.location.replace('/my-bookings');
                }
            }
        };
        var rzp1 = new Razorpay(options);
        
        // Auto-open the checkout modal upon load
        window.onload = function() {
            rzp1.open();
        };
    </script>
</body>
</html>
